schema {
  query: Input
}

type Input {
  cart: Cart!
  cartTransform: CartTransform!
}

type CartTransform {
  metafield(namespace: String!, key: String!): Metafield
}

type Cart {
  lines: [CartLine!]!
}

type CartLine {
  id: ID!
  quantity: Int!
  merchandise: Merchandise!
}

union Merchandise = ProductVariant

type ProductVariant {
  id: ID!
}

type Metafield {
  value: String!
}

scalar ID
