query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      gwp: attribute(key: "_gwp") { value }
      gwpMain: attribute(key: "_gwp_main") { value }
      merchandise {
        ... on ProductVariant {
          id
        }
      }
    }
  }
  discount {
    metafield(namespace: "upsale", key: "config") {
      value
    }
  }
}
